<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Sun Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Cloud Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.6"/>
    </filter>

    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <!-- Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Cloud Back Light -->
    <linearGradient id="cloudBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background Icon Frame -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer Glow for Sun -->
  <circle cx="340" cy="180" r="70" fill="url(#sunGrad)" opacity="0.3" filter="url(#glow)" />

  <!-- Sun -->
  <circle cx="340" cy="180" r="64" fill="url(#sunGrad)" filter="url(#glow)" />
  
  <!-- Sun Rays (subtle) -->
  <g stroke="url(#sunGrad)" stroke-width="8" stroke-linecap="round" opacity="0.8">
    <line x1="340" y1="86" x2="340" y2="98" />
    <line x1="340" y1="262" x2="340" y2="274" />
    <line x1="246" y1="180" x2="258" y2="180" />
    <line x1="422" y1="180" x2="434" y2="180" />
    <line x1="274" y1="114" x2="282" y2="122" />
    <line x1="398" y1="238" x2="406" y2="246" />
    <line x1="274" y1="246" x2="282" y2="238" />
    <line x1="398" y1="122" x2="406" y2="114" />
  </g>

  <!-- Back Cloud (rain/glow effect) -->
  <path d="M220 230
           a 50 50 0 0 1 85 0
           a 65 65 0 0 1 115 40
           a 40 40 0 0 1 -10 80
           l -190 0
           a 55 55 0 0 1 0 -120" 
        fill="url(#cloudBackGrad)" opacity="0.6" />

  <!-- Front Cloud -->
  <path d="M160 260
           a 60 60 0 0 1 100 -20
           a 80 80 0 0 1 150 40
           a 50 50 0 0 1 -20 100
           l -230 0
           a 70 70 0 0 1 0 -120" 
        fill="url(#cloudGrad)" filter="url(#shadow)" />
</svg>
